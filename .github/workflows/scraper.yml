name: Weekly Benchmark Scraper

on:
  schedule:
    - cron: '0 17 * * 5' # 5:00 PM every Friday
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab
    inputs:
      targetWeek:
        description: 'Target Week (e.g., "09 Mar 2026"). Leave blank to use current week.'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './functions/package-lock.json'
          
      - name: Install Dependencies
        working-directory: ./functions
        run: npm ci
        
      - name: Run Scraper Script
        working-directory: ./functions
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        # Expose Chrome/Puppeteer to the headless environment
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev
          node runScraper.js "${{ github.event.inputs.targetWeek }}"
